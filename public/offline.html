<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10141d" />
    <title>SignalForge Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        background: #080a0f;
        color: #f4f7fb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      main { width: min(100%, 480px); text-align: center; }
      .mark {
        display: grid;
        place-items: center;
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        border: 2px solid #22d3ee;
        border-radius: 12px;
        color: #f8c14a;
        font-size: 24px;
        font-weight: 800;
      }
      h1 { margin: 0 0 12px; font-size: 32px; letter-spacing: 0; }
      p { margin: 0 0 24px; color: #8e9bb0; line-height: 1.55; }
      button {
        padding: 11px 18px;
        border: 1px solid #22d3ee;
        border-radius: 6px;
        background: #22d3ee;
        color: #061016;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">SF</div>
      <h1>SignalForge is offline</h1>
      <p>Live market scans and account data need a connection. Reconnect, then retry.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
